name: CI

on:
  pull_request:
    branches: [develop]
  push:
    branches: [develop]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust tests and lint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v7
      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
      - name: Test workspace
        run: cargo test --locked --workspace
      - name: Lint workspace
        run: cargo clippy --locked --workspace --all-targets --all-features -- -D warnings

  macos:
    name: macOS tests
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - name: Install build tools
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add aarch64-apple-darwin
          brew install opus
          brew install --cask tuist
      - name: Build macOS Rust libraries
        run: |
          CONFIGURATION=Debug \
          ARCHS=arm64 \
          CURRENT_ARCH=undefined_arch \
            scripts/rust/build_lumen_engine.sh
      - name: Test Lumen app
        working-directory: src/platform/macos
        run: |
          opus_prefix="$(brew --prefix opus)"
          export TUIST_LUMEN_OPUS_ARCHIVE="${opus_prefix}/lib/libopus.a"
          tuist test --no-selective-testing --no-binary-cache LumenTuistTests
      - name: Build Lumen app
        working-directory: src/platform/macos
        run: |
          opus_prefix="$(brew --prefix opus)"
          export TUIST_LUMEN_OPUS_ARCHIVE="${opus_prefix}/lib/libopus.a"
          tuist generate --no-open
          tuist xcodebuild build \
            -workspace Lumen.xcworkspace \
            -scheme LumenApp \
            -configuration Debug \
            -destination 'generic/platform=macOS' \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=YES \
            CODE_SIGNING_ALLOWED=NO

  windows:
    name: Windows compile check
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install Rust
        shell: pwsh
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
      - name: Check workspace
        run: cargo check --locked --workspace --all-targets --all-features
